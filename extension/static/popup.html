<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formerly</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      color: #333;
    }
    textarea {
      width: 100%;
      height: 90px;
      margin-top: 10px;
      margin-bottom: 12px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: none;
      font-family: inherit;
    }
    textarea:focus {
      outline: none;
      border-color: #4285f4;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background-color: #3367d6;
    }
    button:disabled {
      background-color: #a0c3ff;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #555;
      min-height: 18px;
      text-align: center;
    }
    h3 {
      margin: 0 0 5px 0;
      font-size: 16px;
      color: #202124;
    }
    p.subtitle {
      margin: 0;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <h3>Formerly</h3>
  
  <div id="signin-section">
    <p class="subtitle" style="margin-bottom: 12px;">Sign in with Google to create forms directly in your Drive.</p>
    <button id="signinBtn">Sign In / Authorize</button>
  </div>

  <div id="app-section" style="display: none;">
    <p class="subtitle">Describe the form you want to make</p>
    <textarea id="prompt" placeholder="E.g., A volunteer sign-up form..."></textarea>
    <button id="generateBtn">Generate Form</button>
  </div>
  
  <div id="status"></div>
  
  <script src="../js/browser-polyfill.js"></script>
  <script src="../js/popup.js"></script>
</body>
</html>
