<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formerly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #f0eff4;
      --muted: #7b7a87;
      --accent: #c4b5fd;
      --accent-dim: rgba(196, 181, 253, 0.12);
      --accent-glow: rgba(196, 181, 253, 0.25);
      --green: #a3e635;
      --green-dim: rgba(163, 230, 53, 0.1);
      --radius: 14px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f4f8;
        --surface: #ffffff;
        --surface2: #f0eef8;
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.16);
        --text: #1a1825;
        --muted: #7b7a87;
        --accent: #7c3aed;
        --accent-dim: rgba(124, 58, 237, 0.08);
        --accent-glow: rgba(124, 58, 237, 0.15);
        --green: #4d7c0f;
        --green-dim: rgba(77, 124, 15, 0.08);
      }
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 0;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: conic-gradient(from 180deg, var(--accent), transparent 50%);
      opacity: 0.3;
      animation: spin 6s linear infinite;
    }

    .logo-mark svg {
      position: relative;
      z-index: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .header-text h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .header-text span {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      line-height: 1;
    }

    /* Body */
    .body {
      padding: 16px 18px 18px;
      background: var(--bg);
    }

    /* Sign-in section */
    #signin-section {
      animation: fadeUp 0.3s ease both;
    }

    .signin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 14px;
    }

    .signin-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .signin-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .signin-card strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* App section */
    #app-section {
      animation: fadeUp 0.3s ease both;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    textarea {
      width: 100%;
      height: 96px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--border-hover);
      background: var(--surface2);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Google icon for sign-in btn */
    .g-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Status */
    #status {
      margin-top: 12px;
      min-height: 16px;
      font-size: 12px;
      text-align: center;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: fadeUp 0.3s ease both;
    }

    #status.success { color: var(--green); }
    #status.error { color: #f87171; }

    .dot-loader {
      display: inline-flex;
      gap: 3px;
    }
    .dot-loader span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1.2s infinite both;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; }
      40% { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider with suggestion chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    .chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1" fill="var(--accent)" opacity="0.9"/>
        <rect x="9" y="2" width="5" height="5" rx="1" fill="var(--accent)" opacity="0.5"/>
        <rect x="2" y="9" width="5" height="5" rx="1" fill="var(--accent)" opacity="0.5"/>
        <rect x="9" y="9" width="5" height="5" rx="1" fill="var(--accent)" opacity="0.2"/>
      </svg>
    </div>
    <div class="header-text">
      <h3>Formerly</h3>
      <span>AI form builder for Google Drive</span>
    </div>
  </div>

  <div class="body">
    <div id="signin-section">
      <div class="signin-card">
        <div class="signin-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="var(--accent)" opacity="0.8"/>
          </svg>
        </div>
        <strong>Connect your account</strong>
        <p>Sign in with Google to generate and save forms directly to your Drive.</p>
      </div>
      <button class="btn btn-outline" id="signinBtn">
        <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <div id="app-section" style="display: none;">
      <div class="label">Describe your form</div>
      <textarea id="prompt" placeholder="e.g. A volunteer sign-up form with name, email, availability, and t-shirt size…"></textarea>

      <div class="chips" id="suggestChips">
        <span class="chip">📋 Event RSVP</span>
        <span class="chip">📝 Feedback survey</span>
        <span class="chip">🙋 Job application</span>
        <span class="chip">📅 Scheduling poll</span>
      </div>

      <button class="btn btn-primary" id="generateBtn">
        Generate Form
      </button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    // Suggestion chip click → populate textarea
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const map = {
          '📋 Event RSVP': 'An event RSVP form with name, email, number of guests, dietary restrictions, and attendance confirmation.',
          '📝 Feedback survey': 'A customer feedback survey with a rating scale, open-ended comments, NPS score, and contact info.',
          '🙋 Job application': 'A job application form with name, email, phone, resume upload, LinkedIn URL, and cover letter.',
          '📅 Scheduling poll': 'A meeting scheduling poll with name, email, preferred dates, time zones, and notes.',
        };
        document.getElementById('prompt').value = map[chip.textContent] || '';
        document.getElementById('prompt').focus();
      });
    });
  </script>

  <script src="../js/browser-polyfill.js"></script>
  <script src="../js/popup.js"></script>
</body>
</html>
