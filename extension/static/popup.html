<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formerly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:          #0d0d0b;
      --ink-soft:     #161613;
      --ink-border:   #252520;
      --parchment:    #f0ead8;
      --parchment-dim:#a39e8e;
      --parchment-ghost: #222219;
      --lime:         #c8f135;
      --lime-dim:     #8eb020;
      --white:        #fafaf8;

      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-mono:  'Geist Mono', 'Courier New', monospace;
      --font-sans:  'Instrument Sans', system-ui, sans-serif;
    }

    body {
      width: 320px;
      background: var(--ink);
      color: var(--parchment);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--ink-border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--ink-soft);
      position: relative;
      overflow: hidden;
    }

    /* Grid background like the landing hero */
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      mask-image: linear-gradient(to right, transparent, black 60%);
      pointer-events: none;
    }

    .logo-mark {
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1;
      position: relative;
      z-index: 1;
      letter-spacing: -0.02em;
    }
    .logo-mark .f { color: var(--lime); }
    .logo-mark .rest { color: var(--white); }

    .header-sub {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--parchment-dim);
      position: relative;
      z-index: 1;
      margin-left: auto;
    }

    /* ── Body ─────────────────────────────────────────── */
    .body {
      padding: 14px 16px 16px;
      background: var(--ink);
    }

    /* ── Sign-in section ──────────────────────────────── */
    #signin-section { animation: fadeUp 0.3s ease both; }

    .signin-card {
      background: var(--ink-soft);
      border: 1px solid var(--ink-border);
      border-radius: 4px;
      padding: 18px 16px;
      text-align: center;
      margin-bottom: 12px;
    }

    .signin-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(200,241,53,0.07);
      border: 1px solid rgba(200,241,53,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
    }

    .signin-card strong {
      display: block;
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 15px;
      color: var(--white);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .signin-card p {
      color: var(--parchment-dim);
      font-size: 11.5px;
      line-height: 1.55;
    }

    /* ── App section ──────────────────────────────────── */
    #app-section { animation: fadeUp 0.3s ease both; }

    .field-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--lime);
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 90px;
      padding: 10px 11px;
      background: var(--ink-soft);
      border: 1px solid var(--ink-border);
      border-radius: 3px;
      color: var(--parchment);
      font-family: var(--font-sans);
      font-size: 12.5px;
      line-height: 1.55;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    textarea::placeholder { color: rgba(163,158,142,0.4); }
    textarea:focus {
      outline: none;
      border-color: rgba(200,241,53,0.4);
      box-shadow: 0 0 0 2px rgba(200,241,53,0.07);
    }

    /* ── Chips ────────────────────────────────────────── */
    .chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px;
    }
    .chip {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 2px;
      background: var(--parchment-ghost);
      border: 1px solid var(--ink-border);
      color: var(--parchment-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover {
      border-color: rgba(200,241,53,0.3);
      color: var(--lime);
      background: rgba(200,241,53,0.05);
    }

    /* ── Buttons ──────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 9px 16px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.18s ease;
    }

    .btn-primary {
      background: var(--lime);
      color: var(--ink);
      font-weight: 500;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,241,53,0.18);
    }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }

    .btn-outline {
      background: var(--ink-soft);
      color: var(--parchment);
      border: 1px solid var(--ink-border);
    }
    .btn-outline:hover {
      border-color: rgba(200,241,53,0.25);
      color: var(--white);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .g-icon { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Status ───────────────────────────────────────── */
    #status {
      margin-top: 10px;
      min-height: 16px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-align: center;
      color: var(--parchment-dim);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #status.success { color: var(--lime); }
    #status.error   { color: #e87070; }

    .dot-loader { display: inline-flex; gap: 3px; }
    .dot-loader span {
      width: 3px; height: 3px; border-radius: 50%;
      background: currentColor;
      animation: blink 1.2s infinite both;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; }
      40% { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer strip ─────────────────────────────────── */
    .footer-strip {
      border-top: 1px solid var(--ink-border);
      padding: 7px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-strip span {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--ink-border);
      text-transform: uppercase;
    }
    .footer-strip .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--lime);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,241,53,0.5); }
      50% { box-shadow: 0 0 0 4px rgba(200,241,53,0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">
      <span class="f">F</span><span class="rest">ormerly</span>
    </div>
    <span class="header-sub">AI Forms</span>
  </div>

  <div class="body">
    <div id="signin-section">
      <div class="signin-card">
        <div class="signin-icon">
          <!-- Google G icon -->
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </div>
        <strong>Connect your account</strong>
        <p>Sign in with Google to generate forms<br>directly in your Drive.</p>
      </div>
      <button class="btn btn-outline" id="signinBtn">
        <svg class="g-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <div id="app-section" style="display: none;">
      <div class="field-label">Describe your form</div>
      <textarea id="prompt" placeholder="e.g. A volunteer sign-up sheet with name, availability, and t-shirt size…"></textarea>

      <div class="chips" id="suggestChips">
        <span class="chip">Event RSVP</span>
        <span class="chip">Feedback survey</span>
        <span class="chip">Job application</span>
        <span class="chip">Scheduling poll</span>
      </div>

      <button class="btn btn-primary" id="generateBtn">
        Generate Form →
      </button>
    </div>

    <div id="status"></div>
  </div>

  <div class="footer-strip">
    <span>formerly · v1.0</span>
    <div class="dot"></div>
  </div>

  <script>
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const map = {
          'Event RSVP': 'An event RSVP form with name, email, number of guests, dietary restrictions, and attendance confirmation.',
          'Feedback survey': 'A customer feedback survey with a rating scale, open-ended comments, NPS score, and contact info.',
          'Job application': 'A job application form with name, email, phone, LinkedIn URL, and a cover letter paragraph.',
          'Scheduling poll': 'A meeting scheduling poll with name, email, preferred dates checkboxes, time zone dropdown, and notes.',
        };
        document.getElementById('prompt').value = map[chip.textContent.trim()] || '';
        document.getElementById('prompt').focus();
      });
    });
  </script>

  <script src="../js/browser-polyfill.js"></script>
  <script src="../js/popup.js"></script>
</body>
</html>
